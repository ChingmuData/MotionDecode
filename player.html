<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Motion Preview — ChingMu 1000H</title>
  <style>
    /* ====== 重置 & 全屏画布 ====== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050505; color:#eee; font-family: 'Inter', system-ui, sans-serif; overflow:hidden; }
    #c { display:block; width:100vw; height:100vh; }

    /* ====== 底部控制条（模仿你站的暗色毛玻璃风）====== */
    #ui {
      position:fixed; bottom:0; left:0; width:100%;
      background: rgba(8,8,12,.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,0,136,.25);
      padding: 16px 32px 20px;
      display:flex; flex-direction:column; gap:10px;
      z-index:10;
    }
    #ui .top { display:flex; justify-content:space-between; align-items:center; }
    #ui .title { font-size:13px; letter-spacing:.8px; color:#aaa; }
    #ui .title b { color:#fff; }
    #btn-close {
      background:none; border:1px solid #444; color:#999;
      padding:3px 12px; border-radius:16px; cursor:pointer; font-size:12px;
    }
    #btn-close:hover { border-color:#fff; color:#fff; }

    #timeline { display:flex; align-items:center; gap:14px; }
    #play-btn {
      background: #ff0088; border:none; color:#fff;
      padding:5px 18px; border-radius:20px; font-size:13px; font-weight:600;
      cursor:pointer;
      box-shadow: 0 0 12px rgba(255,0,136,.45);
    }
    #play-btn:hover { background:#ff2299; }
    #seek-wrap { flex:1; position:relative; height:20px; display:flex; align-items:center; }
    #seek {
      width:100%; height:4px; -webkit-appearance:none; appearance:none;
      background:#222; border-radius:2px; outline:none; cursor:pointer;
    }
    #seek::-webkit-slider-thumb {
      -webkit-appearance:none; width:14px; height:14px;
      background:#ff0088; border-radius:50%;
      box-shadow: 0 0 10px rgba(255,0,136,.7);
    }
    #time-label { font-size:11px; color:#777; min-width:90px; text-align:right; font-variant-numeric:tabular-nums; }

    #hint { font-size:11px; color:#555; text-align:center; margin-top:2px; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="top">
    <div class="title"><b>ChingMu</b> · Motion Preview · BVH Playback</div>
    <button id="btn-close" onclick="location.href='index.html'">← Back</button>
  </div>

  <div id="timeline">
    <button id="play-btn">▶ Play</button>
    <div id="seek-wrap">
      <input id="seek" type="range" min="0" max="1" step="0.001" value="0" />
    </div>
    <div id="time-label">0.00 / 0.00 s</div>
  </div>
  <div id="hint">拖拽旋转 · 滚轮缩放 · 滑动条seek · 左上角返回主页</div>
</div>

<!-- ============ Three.js 从 CDN 引入（ES Module 方式，现代浏览器都支持）============ -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { BVHLoader } from 'three/addons/loaders/BVHLoader.js';

/* ---------- 配置：你的 BVH 文件路径 ---------- */
const BVH_PATH = 'assets/dance.bvh';   // ← 把你的示例 bvh 放 assets/ 下改这就行
/* --------------------------------------------- */

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 120, 350);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.target.set(0, 90, 0);
controls.update();

// 灯光
scene.add(new THREE.AmbientLight(0x606060, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 1.4);
dir.position.set(80, 200, 120);
scene.add(dir);

// 地面网格（你站 dark theme 风格）
const grid = new THREE.GridHelper(500, 40, 0x222222, 0x111118);
grid.position.y = 0;
scene.add(grid);

// 坐标轴指示（可选，看着直观）
// scene.add(new THREE.AxesHelper(60));

/* ---------- 加载 BVH ---------- */
const loader = new BVHLoader();
loader.load(
  BVH_PATH,
  (result) => {
    const bonesGroup = new THREE.Group();
    bonesGroup.add(result.skeleton.bones[0]);
    scene.add(bonesGroup);

    // SkeletonHelper 画骨骼线（粉/洋红风格）
    const skelHelper = new THREE.SkeletonHelper(result.skeleton.bones[0]);
    // 改线色：得换材质
    if (skelHelper.material) {
      skelHelper.material = new THREE.LineBasicMaterial({
        color: 0xff0088,
        linewidth: 2,
        depthTest: true,
      });
    }
    scene.add(skelHelper);

    // 在骨骼根下加一个小球代表"头"或"根"方便看（可选）
    const rootSphere = new THREE.Mesh(
      new THREE.SphereGeometry(4, 16, 16),
      new THREE.MeshBasicMaterial({ color:0xff0088, depthTest:false })
    );
    result.skeleton.bones[0].add(rootSphere);
    rootSphere.position.set(0,0,0);

    /* ---- Mixer 驱动动画 ---- */
    const mixer = new THREE.AnimationMixer(result.skeleton.bones[0]);
    const action = mixer.clipAction(result.clip);
    action.play();

    const clip = result.clip;
    const clock = new THREE.Clock();
    let playing = true;

    // UI 绑定
    const playBtn  = document.getElementById('play-btn');
    const seekEl   = document.getElementById('seek');
    const timeLbl  = document.getElementById('time-label');
    const dur = clip.duration;
    seekEl.max = dur;

    playBtn.onclick = () => {
      playing = !playing;
      playBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
      if (playing) clock.start();
      else { clock.stop(); action.paused = true; }
    };

    seekEl.addEventListener('input', () => {
      const t = parseFloat(seekEl.value);
      action.time = t;
      action.paused = true;          // 拖拽时冻结
      mixer.update(0);               // 强制刷新一帧
      timeLbl.textContent = `${t.toFixed(2)} / ${dur.toFixed(1)} s`;
    });
    seekEl.addEventListener('change', () => {
      if (playing) { action.paused = false; clock.start(); }
    });

    /* ---- 渲染循环 ---- */
    function animate() {
      requestAnimationFrame(animate);
      if (playing) mixer.update(clock.getDelta());
      controls.update();
      renderer.render(scene, camera);

      // 进度条跟随（仅当不在手动拖拽时）
      if (document.activeElement !== seekEl) {
        seekEl.value = action.time;
        timeLbl.textContent = `${action.time.toFixed(2)} / ${dur.toFixed(1)} s`;
      }
    }
    animate();
  },
  // progress
  (xhr) => {
    console.log(`BVH loading: ${(xhr.loaded/xhr.total*100).toFixed(0)}%`);
  },
  (err) => {
    console.error('BVH load error:', err);
    document.getElementById('hint').textContent = '⚠ BVH 加载失败，请检查 assets/sample.bvh 路径';
    document.getElementById('hint').style.color = '#ff4444';
  }
);

/* ---------- resize ---------- */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
