<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChingMu Motion Preview</title>
<style>
  /* ===== 全局重置 ===== */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: #0b1120;  /* 深蓝黑背景，配合蓝白主题 */
    color: #e2e8f0; 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden; 
    height: 100vh;
  }

  /* ===== 顶部标题栏 ===== */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.5rem;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(96, 165, 250, 0.2);
  }
  .header h1 {
    font-size: 1rem;
    font-weight: 600;
    color: #93c5fd;
  }
  .header a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.3rem 1rem;
    border: 1px solid #334155;
    border-radius: 20px;
    transition: 0.2s;
  }
  .header a:hover {
    border-color: #60a5fa;
    color: #fff;
  }

  /* ===== 3D 画布容器 ===== */
  #canvas-container {
    width: 100vw;
    height: 100vh;
  }

  /* ===== 底部控制条 ===== */
  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.8rem 1.5rem;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(96, 165, 250, 0.2);
  }
  .controls button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .controls button:hover { background: #3b82f6; }
  .controls button:disabled { background: #334155; cursor: not-allowed; }

  .controls input[type="range"] {
    flex: 1;
    height: 5px;
    -webkit-appearance: none;
    appearance: none;
    background: #1e293b;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #3b82f6;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
  }
  .controls input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: #3b82f6;
    border-radius: 50%;
    border: none;
  }

  #time-display {
    font-size: 0.8rem;
    color: #94a3b8;
    min-width: 110px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .hint {
    font-size: 0.72rem;
    color: #475569;
    margin-left: auto;
  }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="header">
  <h1>ChingMu · Motion Preview</h1>
  <a href="index.html">← Back to Home</a>
</div>

<!-- 3D 画布 -->
<div id="canvas-container"></div>

<!-- 底部控制条 -->
<div class="controls">
  <button id="play-btn">▶ Play</button>
  <input type="range" id="seek-bar" min="0" max="1" step="0.001" value="0">
  <span id="time-display">0.00 / 0.00 s</span>
  <span class="hint">Drag to orbit · Scroll to zoom</span>
</div>

<!-- 引入 Three.js 及 BVHLoader（ES Modules 方式） -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { BVHLoader } from 'three/addons/loaders/BVHLoader.js';

// ===== 配置：你的 BVH 文件路径 =====
const BVH_PATH = 'assets/dance.bvh';   // 请将你的 BVH 文件放在 assets/ 下

// ===== 全局变量 =====
let container, camera, scene, renderer, controls;
let mixer, action, clock;
let isPlaying = false;
let duration = 0; // 动画总时长

// ===== 初始化 =====
init();
animate();

function init() {
  container = document.getElementById('canvas-container');
  
  // 场景
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b1120); // 深蓝黑

  // 相机
  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
  camera.position.set(0, 140, 380);

  // 渲染器
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  // 灯光
  const ambient = new THREE.AmbientLight(0x606080, 1.2);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(80, 200, 120);
  scene.add(dirLight);

  // 控制器
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 100, 0);
  controls.enableDamping = true;
  controls.update();

  // 网格地面（蓝灰色调）
  const gridHelper = new THREE.GridHelper(500, 40, 0x1e293b, 0x0f172a);
  scene.add(gridHelper);

  // ===== 加载 BVH =====
  const loader = new BVHLoader();
  loader.load(
    BVH_PATH,
    function (result) {
      const skeleton = result.skeleton;
      const clip = result.clip;

      // 添加骨骼到场景
      const boneGroup = new THREE.Group();
      boneGroup.add(skeleton.bones[0]);
      scene.add(boneGroup);

      // 创建骨骼辅助线（白色线条，无球体）
      const helper = new THREE.SkeletonHelper(skeleton.bones[0]);
      helper.material.color.set(0xffffff);
      helper.material.linewidth = 1;
      scene.add(helper);

      // 隐藏 SkeletonHelper 自动生成的根骨骼球体（大圆点）
      if (helper.bones && helper.bones.length > 0) {
        helper.bones[0].visible = false;
      }

      // 设置动画混合器
      mixer = new THREE.AnimationMixer(skeleton.bones[0]);
      action = mixer.clipAction(clip);
      
      // 获取动画时长，并做安全检查
      if (clip.duration && clip.duration > 0) {
        duration = clip.duration;
      } else {
        duration = 1; // 默认值
        console.warn('⚠️ 未检测到有效动画时长，已设为默认值 1s');
      }

      // 更新 UI
      const seekBar = document.getElementById('seek-bar');
      const timeDisplay = document.getElementById('time-display');
      seekBar.max = duration;
      timeDisplay.textContent = `0.00 / ${duration.toFixed(1)} s`;

      // 自动播放
      isPlaying = true;
      document.getElementById('play-btn').textContent = '⏸ Pause';
      clock = new THREE.Clock();
      clock.start();
      action.play();
    },
    undefined,
    function (error) {
      console.error('❌ BVH 加载失败:', error);
      alert('BVH 文件加载失败，请检查控制台输出和网络请求。');
    }
  );

  // ===== UI 事件绑定 =====
  const playBtn = document.getElementById('play-btn');
  const seekBar = document.getElementById('seek-bar');
  const timeDisplay = document.getElementById('time-display');

  playBtn.addEventListener('click', () => {
    if (!action) return;
    isPlaying = !isPlaying;
    playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
    if (isPlaying) {
      clock.start();
      action.paused = false;
    } else {
      clock.stop();
      action.paused = true;
    }
  });

  seekBar.addEventListener('input', () => {
    if (!action) return;
    const t = parseFloat(seekBar.value);
    action.time = t;
    action.paused = true;  // 拖动时暂停动画
    mixer.update(0);
    if (duration > 0) {
      timeDisplay.textContent = `${t.toFixed(2)} / ${duration.toFixed(1)} s`;
    }
  });

  seekBar.addEventListener('change', () => {
    if (isPlaying && action) {
      action.paused = false;
      clock.start();
    }
  });

  // 窗口自适应
  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
}

// ===== 动画循环 =====
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (mixer && isPlaying) {
    mixer.update(clock.getDelta());
  }

  // 更新进度条和时间显示（非拖动时）
  const seekBar = document.getElementById('seek-bar');
  const timeDisplay = document.getElementById('time-display');
  if (action && document.activeElement !== seekBar) {
    seekBar.value = action.time;
    if (duration > 0) {
      timeDisplay.textContent = `${action.time.toFixed(2)} / ${duration.toFixed(1)} s`;
    }
  }

  renderer.render(scene, camera);
}
</script>
</body>
</html>
