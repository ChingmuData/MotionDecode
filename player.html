<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChingMu Motion Preview</title>
<style>
  /* ===== 全局重置 ===== */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: #0b1120;  /* 【修改】深蓝黑背景，配合蓝白主题 */
    color: #e2e8f0; 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden; 
    height: 100vh;
  }

  /* ===== 顶部标题栏 ===== */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.5rem;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(96, 165, 250, 0.2); /* 蓝色细边 */
  }
  .header h1 {
    font-size: 1rem;
    font-weight: 600;
    color: #93c5fd; /* 浅蓝 */
  }
  .header a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.3rem 1rem;
    border: 1px solid #334155;
    border-radius: 20px;
    transition: 0.2s;
  }
  .header a:hover {
    border-color: #60a5fa;
    color: #fff;
  }

  /* ===== 3D 画布容器 ===== */
  #canvas-container {
    width: 100vw;
    height: 100vh;
  }

  /* ===== 底部控制条 ===== */
  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.8rem 1.5rem;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(96, 165, 250, 0.2);
  }
  .controls button {
    background: #2563eb;      /* 【修改】蓝色按钮 */
    color: white;
    border: none;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .controls button:hover { background: #3b82f6; }
  .controls button:disabled { background: #334155; cursor: not-allowed; }

  .controls input[type="range"] {
    flex: 1;
    height: 5px;
    -webkit-appearance: none;
    appearance: none;
    background: #1e293b;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #3b82f6;      /* 【修改】蓝色滑块 */
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
  }
  .controls input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: #3b82f6;
    border-radius: 50%;
    border: none;
  }

  #time-display {
    font-size: 0.8rem;
    color: #94a3b8;
    min-width: 110px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .hint {
    font-size: 0.72rem;
    color: #475569;
    margin-left: auto;
  }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="header">
  <h1>ChingMu · Motion Preview</h1>
  <a href="index.html">← Back to Home</a>
</div>

<!-- 3D 画布 -->
<div id="canvas-container"></div>

<!-- 底部控制条 -->
<div class="controls">
  <button id="play-btn">▶ Play</button>
  <input type="range" id="seek-bar" min="0" max="1" step="0.001" value="0">
  <span id="time-display">0.00 / 0.00 s</span>
  <span class="hint">Drag to orbit · Scroll to zoom</span>
</div>

<!-- 【修改】引入 Three.js 及相关加载器（使用 ES Modules 方式） -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { BVHLoader } from 'three/addons/loaders/BVHLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';  // 【修改】支持 GLTF

// ===== 配置 =====
// 【修改】你可以在这里修改文件路径，支持 .bvh 或 .glb/.gltf
const MOTION_FILE = 'assets/dance.bvh';  // 也可改为 'assets/sample.glb'

// ===== 场景初始化 =====
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = false;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1120);  // 深蓝黑背景

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
camera.position.set(0, 140, 380);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 100, 0);
controls.enableDamping = true;
controls.update();

// 灯光
const ambient = new THREE.AmbientLight(0x606080, 1.2);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(80, 200, 120);
scene.add(dirLight);

// 网格地面（蓝灰色调）
const gridHelper = new THREE.GridHelper(500, 40, 0x1e293b, 0x0f172a);
scene.add(gridHelper);

// ===== 加载动画数据 =====
let mixer = null;
let action = null;
let isPlaying = false;
const clock = new THREE.Clock();

// 根据文件扩展名选择加载器
function loadMotion(filePath) {
  const ext = filePath.split('.').pop().toLowerCase();
  
  if (ext === 'bvh') {
    const loader = new BVHLoader();
    loader.load(filePath, onBVHLoaded, undefined, onError);
  } else if (ext === 'glb' || ext === 'gltf') {
    const loader = new GLTFLoader();
    loader.load(filePath, onGLTFLoaded, undefined, onError);
  } else {
    console.error('Unsupported format:', ext);
    alert('不支持的文件格式，请使用 .bvh 或 .glb/.gltf');
  }
}

// ----- BVH 加载成功回调 -----
function onBVHLoaded(result) {
  const skeleton = result.skeleton;
  const clip = result.clip;

  // 添加骨骼到场景
  const boneGroup = new THREE.Group();
  boneGroup.add(skeleton.bones[0]);
  scene.add(boneGroup);

  // 创建骨骼辅助线（白色线条，无球体）
  const helper = new THREE.SkeletonHelper(skeleton.bones[0]);
  helper.material.color.set(0xffffff);
  helper.material.linewidth = 1;
  scene.add(helper);

  // 【修改】隐藏 SkeletonHelper 自动生成的根骨骼球体
  if (helper.bones && helper.bones.length > 0) {
    helper.bones[0].visible = false;  // 隐藏根骨骼上的大圆点
  }

  // 设置动画混合器
  mixer = new THREE.AnimationMixer(skeleton.bones[0]);
  action = mixer.clipAction(clip);
  action.play();
  isPlaying = true;

  setupUI(clip.duration);
}

// ----- GLTF 加载成功回调 -----
function onGLTFLoaded(gltf) {
  const model = gltf.scene;
  scene.add(model);

  // 如果有骨骼动画
  if (gltf.animations && gltf.animations.length > 0) {
    mixer = new THREE.AnimationMixer(model);
    action = mixer.clipAction(gltf.animations[0]);
    action.play();
    isPlaying = true;
    setupUI(gltf.animations[0].duration);
  } else {
    console.warn('GLTF 没有动画数据');
    setupUI(0);
  }
}

function onError(error) {
  console.error('加载失败:', error);
  alert('数据加载失败，请检查文件路径和格式');
}

// ===== UI 绑定 =====
function setupUI(duration) {
  const playBtn = document.getElementById('play-btn');
  const seekBar = document.getElementById('seek-bar');
  const timeDisplay = document.getElementById('time-display');

  if (duration <= 0) {
    playBtn.disabled = true;
    seekBar.disabled = true;
    timeDisplay.textContent = 'No animation';
    return;
  }

  seekBar.max = duration;
  seekBar.step = 0.001;

  // 播放/暂停
  playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
    if (isPlaying) {
      clock.start();
      action.paused = false;
    } else {
      clock.stop();
      action.paused = true;
    }
  });

  // 进度条拖动
  seekBar.addEventListener('input', () => {
    const t = parseFloat(seekBar.value);
    if (action) {
      action.time = t;
      action.paused = true;      // 拖动时暂停
      mixer.update(0);
    }
    timeDisplay.textContent = `${t.toFixed(2)} / ${duration.toFixed(1)} s`;
  });
  seekBar.addEventListener('change', () => {
    if (isPlaying) {
      action.paused = false;
      clock.start();
    }
  });

  // 开始渲染循环
  animate();
}

// ===== 渲染循环 =====
function animate() {
  requestAnimationFrame(animate);

  if (mixer && isPlaying) {
    mixer.update(clock.getDelta());
  }

  controls.update();

  // 更新进度条和时间显示（非拖动时）
  const seekBar = document.getElementById('seek-bar');
  const timeDisplay = document.getElementById('time-display');
  if (action && document.activeElement !== seekBar) {
    seekBar.value = action.time;
    timeDisplay.textContent = `${action.time.toFixed(2)} / ${seekBar.max.toFixed(1)} s`;
  }

  renderer.render(scene, camera);
}

// ===== 窗口尺寸自适应 =====
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ===== 启动加载 =====
loadMotion(MOTION_FILE);
</script>
</body>
</html>
